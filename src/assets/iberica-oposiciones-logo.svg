<svg
  xmlns="http://www.w3.org/2000/svg"
  width="512"
  height="512"
  viewBox="0 0 512 512"
  fill="none"
  role="img"
  aria-labelledby="ioLogoTitle ioLogoDesc"
>
  <title id="ioLogoTitle">Iberica Oposiciones</title>
  <desc id="ioLogoDesc">
    Isotipo de Iberica Oposiciones con monograma IO y degradado naranja dorado.
  </desc>
  <defs>
    <radialGradient
      id="ioLogoGlowA"
      cx="0"
      cy="0"
      r="1"
      gradientUnits="userSpaceOnUse"
      gradientTransform="translate(154 300) rotate(30) scale(220 180)"
    >
      <stop stop-color="#F97316" stop-opacity="0.96" />
      <stop offset="1" stop-color="#F97316" stop-opacity="0" />
    </radialGradient>
    <radialGradient
      id="ioLogoGlowB"
      cx="0"
      cy="0"
      r="1"
      gradientUnits="userSpaceOnUse"
      gradientTransform="translate(342 244) rotate(24) scale(212 170)"
    >
      <stop stop-color="#FACC15" stop-opacity="0.94" />
      <stop offset="1" stop-color="#FACC15" stop-opacity="0" />
    </radialGradient>
    <linearGradient
      id="ioLogoFill"
      x1="118"
      y1="134"
      x2="384"
      y2="380"
      gradientUnits="userSpaceOnUse"
    >
      <stop stop-color="#FB7185" />
      <stop offset="0.4" stop-color="#F97316" />
      <stop offset="1" stop-color="#FACC15" />
    </linearGradient>
    <filter id="ioLogoShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow
        dx="0"
        dy="14"
        stdDeviation="20"
        flood-color="#7C2D12"
        flood-opacity="0.24"
      />
    </filter>
  </defs>

  <rect width="512" height="512" rx="120" fill="#0F172A" />
  <rect width="512" height="512" rx="120" fill="url(#ioLogoGlowA)" />
  <rect width="512" height="512" rx="120" fill="url(#ioLogoGlowB)" />

  <g filter="url(#ioLogoShadow)">
    <circle
      cx="194"
      cy="256"
      r="94"
      stroke="url(#ioLogoFill)"
      stroke-width="22"
    />
    <path
      d="M154 162H226V186H208V350H172V186H154V162Z"
      fill="url(#ioLogoFill)"
    />
  </g>
</svg>
